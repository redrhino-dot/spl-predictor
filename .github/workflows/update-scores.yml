name: Update Fixture & Score Data
on:
  schedule:
    - cron: '*/2 * * * *'
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests

      - name: Fetch fixtures and live scores
        run: python3 scripts/fetch_scores.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/fixtures.json data/livescores.json
          git diff --staged --quiet || git commit -m "chore: update live scores [skip ci]"
          git push
